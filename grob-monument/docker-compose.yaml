version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: grob_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grob}
      POSTGRES_USER: ${POSTGRES_USER:-grob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grob_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - grob_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grob_user -d grob"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: grob_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-grob}
      DB_USER: ${POSTGRES_USER:-grob_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-grob_pass_2024}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grob_network

  frontend:
    image: nginx:alpine
    container_name: grob_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - grob_network

  adminer:
    image: adminer
    container_name: grob_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - grob_network

volumes:
  postgres_data:

networks:
  grob_network:
    driver: bridge